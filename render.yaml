services:
  # Frontend - React App
  - type: web
    name: travel-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend + All Agents (Combined)
  - type: web
    name: travel-backend-all
    env: python
    region: singapore
    buildCommand: "pip install -r backend/api/requirements.txt"
    startCommand: "bash start_all_services.sh"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_REFRESH_SECRET_KEY
        sync: false
      - key: HOST_AGENT_URL
        value: http://localhost:10000
      - key: CORS_ORIGINS
        value: https://travel-frontend.onrender.com
